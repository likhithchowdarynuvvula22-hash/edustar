<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0A0E27">
  <title>EduStar | Video Lesson Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="edustar-design-system.css">
  <style>
    /* Navbar */
    .es-topbar { display:flex; align-items:center; justify-content:space-between; padding:.75rem 0; gap:1rem; flex-wrap:wrap; }
    .es-topbar__brand { display:flex; align-items:center; gap:.5rem; font-family: var(--es-font-heading); font-size:1.35rem; color: var(--es-color-star-gold); text-decoration:none; }
    .es-topbar__nav { display:flex; gap:.75rem; flex-wrap:wrap; }
    .es-topbar__link { font-size:.9rem; padding:.4rem .8rem; border-radius:999px; color:rgba(245,247,255,.8); text-decoration:none; transition: background var(--es-transition-fast), color var(--es-transition-fast); }
    .es-topbar__link:hover, .es-topbar__link.is-active { background:rgba(255,215,0,.12); color:var(--es-color-star-gold); }
    .es-video { padding: 2rem 0 4rem; }
    .es-video__layout { display:grid; grid-template-columns: minmax(0,1fr) 320px; gap: 1.2rem; align-items:start; }
    .es-video__player { padding: 1rem; }
    .es-video__frame { aspect-ratio: 16/9; border-radius: 28px; background: #000; overflow:hidden; position: relative; box-shadow: var(--es-shadow-card); border: 1px solid rgba(255, 255, 255, 0.08); transition: box-shadow var(--es-transition-med); }
    .es-video__frame:hover { box-shadow: var(--es-shadow-cyan); }
    .es-video__frame iframe { width: 100%; height: 100%; border: 0; opacity: 0; transition: opacity var(--es-transition-med); }
    .es-video__frame iframe.is-loaded { opacity: 1; }
    .es-video__loader { position: absolute; inset: 0; display: grid; place-items: center; background: radial-gradient(circle at center, #111847 0%, #0a0e27 100%); z-index: 2; transition: opacity var(--es-transition-med); }
    .es-video__spinner { width: 52px; height: 52px; border: 3px dashed var(--es-color-orbit-cyan); border-radius: 50%; animation: es-spin-slow 5s linear infinite; box-shadow: var(--es-shadow-cyan); }
    .es-video__points { display:grid; gap: .8rem; margin-top: 1rem; }
    .es-video__point { opacity: 0; transform: translateY(24px); transition: opacity .5s ease, transform .5s ease; }
    .es-video__point.is-visible { opacity:1; transform: translateY(0); }
    .es-video__quiz { margin-top: 1rem; }
    .es-video__quiz .es-btn-primary { width: 100%; }
    .es-video__sidebar { position: sticky; top: 96px; display:grid; gap: .8rem; max-height: calc(100vh - 120px); overflow-y: auto; padding-right: 4px; }
    /* Premium scrollbar for sidebar playlist */
    .es-video__sidebar::-webkit-scrollbar { width: 6px; }
    .es-video__sidebar::-webkit-scrollbar-track { background: transparent; }
    .es-video__sidebar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 99px; }
    .es-video__sidebar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }
    .es-video__lesson { display:grid; grid-template-columns: 72px 1fr; gap: .8rem; padding: .8rem; align-items:center; transition: transform var(--es-transition-fast), border-left-width var(--es-transition-med), opacity var(--es-transition-med), background-color var(--es-transition-fast); border-left: 0 solid var(--es-color-star-gold); cursor: pointer; }
    .es-video__lesson.is-active { border-left-width: 4px; opacity: 1; background: rgba(255, 255, 255, 0.04); }
    .es-video__thumb { width: 72px; height: 54px; border-radius: 16px; overflow:hidden; background: rgba(255,255,255,.08); display:grid; place-items:center; transition: transform var(--es-transition-fast), background var(--es-transition-fast); }
    .es-video__lesson:hover .es-video__thumb { transform: scale(1.05); background: rgba(255, 255, 255, 0.12); }
    .es-video__lesson.is-done .es-video__check { display:inline-block; animation: es-spin-slow .4s ease both; }
    .es-video__check { display:none; }
    .es-video__notes { position: fixed; inset: auto 1rem 1rem 1rem; max-width: 720px; margin: 0 auto; transform: translateY(100%); transition: transform var(--es-transition-med); z-index: var(--es-z-overlay); }
    .es-video__notes.is-open { transform: translateY(0); }
    .es-video__notes-panel { padding: 1rem; }
    .es-video__notes textarea { width: 100%; min-height: 120px; resize: vertical; background: rgba(255,255,255,.04); color: var(--es-color-ink); border: 1px solid rgba(255,255,255,.1); border-radius: 22px; padding: .9rem 1rem; }
    .es-video__count { transition: color var(--es-transition-fast); }
    .es-video__count.is-warn { color: var(--es-color-warning); }
    .es-video__count.is-danger { color: #ff6b6b; }
    .es-video__saved { display:inline-block; margin-left:.4rem; opacity:0; transform: scale(.8); }
    .es-video__saved.is-show { animation: es-pulse-glow .4s ease both; opacity:1; }
    @media (max-width: 960px) { .es-video__layout { grid-template-columns: 1fr; } .es-video__sidebar { position: static; } }
  </style>
</head>
<body>
  <header class="es-shell" style="border-bottom:1px solid rgba(255,255,255,.07);">
    <div class="es-topbar">
      <a class="es-topbar__brand" href="edustar-home.html">🚀⭐ EduStar</a>
      <nav class="es-topbar__nav" aria-label="Main navigation">
        <a class="es-topbar__link" href="edustar-home.html">Home</a>
        <a class="es-topbar__link" href="edustar-subject-hub.html">Subjects</a>
        <a class="es-topbar__link" href="edustar-ai-tech-learning-centre.html">AI Centre</a>
        <a class="es-topbar__link" href="edustar-ai-tutor.html">AI Tutor</a>
        <a class="es-topbar__link" href="edustar-quiz.html">Quiz</a>

      </nav>
    </div>
  </header>
  <main class="es-video es-shell">
    <div class="es-video__layout">
      <section class="es-card es-video__player es-slide-up">
        <h1 id="lesson-title" style="font-size: var(--es-text-2xl); margin-bottom: 0.8rem; color: var(--es-color-star-gold); transition: opacity var(--es-transition-fast);">Lesson 1: What is AI?</h1>
        <div class="es-video__frame" id="video-frame">
          <div class="es-video__loader" id="video-loader">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 0.8rem;">
              <div class="es-video__spinner"></div>
              <span style="font-size: 0.9rem; color: var(--es-color-orbit-cyan); font-weight: 600; letter-spacing: 0.05em;">LOADING LESSON VIDEO...</span>
            </div>
          </div>
          <iframe id="video-iframe" allowfullscreen allow="autoplay" src=""></iframe>
        </div>
        <div class="es-video__points" id="points">
          <!-- Dynamically populated key points -->
        </div>
        <div class="es-video__quiz"><button class="es-btn-primary es-glow">Take the Quiz →</button></div>
      </section>

      <aside class="es-video__sidebar" aria-label="Playlist sidebar">
        <!-- Dynamically populated playlist of lessons in this pillar -->
      </aside>
    </div>

    <section class="es-video__notes es-card" id="notes-panel" aria-label="Notes panel">
      <div class="es-video__notes-panel">
        <div style="display:flex;justify-content:space-between;gap:1rem;align-items:center;">
          <h3>Open Notes</h3>
          <button class="es-btn-secondary" id="close-notes">Close</button>
        </div>
        <textarea id="notes" maxlength="240" placeholder="Write a few learning notes..."></textarea>
        <p><span class="es-video__count" id="count">0 / 240</span><span class="es-video__saved" id="saved">✓ Saved</span></p>
        <button class="es-btn-primary" id="save-notes">Save Notes</button>
      </div>
    </section>
    <div style="margin-top:1rem;"><button class="es-btn-secondary" id="open-notes">Open Notes</button></div>
  </main>
  <script src="edustar-client-api.js"></script>

        // Values & Character
        'respect-elders': {

          keyPoints: [

            { title: 'Encourage teammates', text: 'Say "good job" or "nice try" to support your friends during activities.' },

      const notesPanel = document.getElementById('notes-panel');
      const openNotes = document.getElementById('open-notes');
      const closeNotes = document.getElementById('close-notes');
      const notes = document.getElementById('notes');
      const count = document.getElementById('count');
      const saved = document.getElementById('saved');
      const saveButton = document.getElementById('save-notes');
      const deviceId = window.EduStarAPI.getDeviceId();

      const titleEl = document.getElementById('lesson-title');
      const pointsEl = document.getElementById('points');
      const quizButton = document.querySelector('.es-video__quiz .es-btn-primary');
      const videoLoader = document.getElementById('video-loader');
      const videoIframe = document.getElementById('video-iframe');

      // Wire iframe load handler to dismiss spinner
      if (videoIframe) {
        videoIframe.addEventListener('load', () => {
          if (videoLoader) videoLoader.style.opacity = '0';
          setTimeout(() => {
            if (videoLoader) videoLoader.style.display = 'none';
          }, 400);
          videoIframe.classList.add('is-loaded');
        });
      }

      let currentTopicId = 'what-is-ai';
      let activePillar = null;
      let activePillarName = 'AI & Technology';

      function switchTopic(targetTopicId, pillar) {
        currentTopicId = targetTopicId;
        const details = topicDetails[targetTopicId] || { youtubeId: 'g_78i_ZgL5s', keyPoints: [] };

        // 1. Update playlist items active classes
        const lessonsList = Array.from(document.querySelectorAll('[data-lesson-id]'));
        lessonsList.forEach((item) => {
          const itemTopicId = item.dataset.lessonId;
          const isActive = itemTopicId === targetTopicId;
          item.classList.toggle('is-active', isActive);
          const thumb = item.querySelector('.es-video__thumb');
          if (thumb) {
            thumb.textContent = isActive ? '▶' : (pillar.pillarIcon || '📘');
          }
          const small = item.querySelector('small');
          if (small) {
            small.innerHTML = isActive ? 'Current lesson' : '<span class="es-video__check">✓</span> Ready';
          }
        });

        // 2. Find the topic details in map
        const topic = pillar.topics.find((t) => t.topicId === targetTopicId);
        if (!topic) return;

        // 3. Update title
        if (titleEl) {
          titleEl.style.opacity = '0';
          setTimeout(() => {
            titleEl.textContent = topic.topicName;
            titleEl.style.opacity = '1';
          }, 200);
        }

        // 4. Update URL params dynamically
        const newUrl = new URL(window.location.href);
        newUrl.searchParams.set('topicId', targetTopicId);
        window.history.pushState({}, '', newUrl);

        // 5. Load YouTube video
        if (videoLoader && videoIframe) {
          videoLoader.style.display = 'grid';
          videoLoader.style.opacity = '1';
          videoIframe.classList.remove('is-loaded');
          videoIframe.src = `https://www.youtube.com/embed/${details.youtubeId}?autoplay=1&rel=0`;
        }

        // 6. Update key points with animations
        if (pointsEl) {
          const kps = details.keyPoints.length > 0 ? details.keyPoints : [
            { title: 'Key point 1', text: topic.shortDescription || 'Learn the essentials of this lesson.' },
            { title: 'Key point 2', text: 'Engage with the lesson content to build understanding.' },
            { title: 'Key point 3', text: 'Test your knowledge by taking the quiz after watching.' }
          ];
          
          pointsEl.innerHTML = kps
            .map((p) => `<div class="es-card es-video__point"><strong>${p.title}:</strong> ${p.text}</div>`)
            .join('');

          // trigger slide-up animations
          const pointNodes = Array.from(pointsEl.querySelectorAll('.es-video__point'));
          pointNodes.forEach((node, index) => {
            setTimeout(() => {
              node.classList.add('is-visible');
            }, index * 100);
          });
        }
      }

      // Notes panel functionality
      openNotes.addEventListener('click', () => notesPanel.classList.add('is-open'));
      closeNotes.addEventListener('click', () => notesPanel.classList.remove('is-open'));
      notes.addEventListener('input', () => {
        const remaining = notes.value.length;
        count.textContent = `${remaining} / 240`;
        count.classList.toggle('is-warn', remaining > 170);
        count.classList.toggle('is-danger', remaining > 210);
      });
      saveButton.addEventListener('click', () => {
        window.EduStarAPI.requestJson('/api/notes', {
          method: 'POST',
          body: JSON.stringify({ deviceId, noteText: notes.value }),
        }).catch(() => {});
        saved.classList.remove('is-show');
        void saved.offsetWidth;
        saved.classList.add('is-show');
      });
      window.EduStarAPI.requestJson(`/api/notes?deviceId=${encodeURIComponent(deviceId)}`)
        .then((data) => {
          notes.value = data.note_text || '';
          notes.dispatchEvent(new Event('input'));
        })
        .catch(() => {
          notes.dispatchEvent(new Event('input'));
        });

      // Parse params and initialize layout
      const params = new URLSearchParams(window.location.search);
      const topicId = params.get('topicId');
      const pillarId = params.get('pillarId');
      const pillarName = params.get('pillarName');

      // Setup Quiz Button Listener
      if (quizButton) {
        quizButton.addEventListener('click', () => {
          const url = `edustar-quiz.html?pillarName=${encodeURIComponent(activePillarName)}&topicId=${encodeURIComponent(currentTopicId)}&grade=${encodeURIComponent(window.localStorage.getItem('edustar-grade') || '1')}`;
          window.location.href = url;
        });
      }

      function initializeWithMap(map) {
        const pillar = map.find((p) => p.pillarId === pillarId || p.pillarName === pillarName);
        activePillar = pillar || map[1] || map[0]; // fallback to AI & Tech or first pillar
        activePillarName = activePillar.pillarName;

        const initialTopicId = topicId || activePillar.topics[0]?.topicId;

        // Render dynamic playlist
        const sidebar = document.querySelector('.es-video__sidebar');
        if (sidebar && activePillar) {
          sidebar.innerHTML = activePillar.topics.map((t) => {
            const isActive = t.topicId === initialTopicId;
            const icon = activePillar.pillarIcon || '📚';
            return `
              <article class="es-card es-video__lesson ${isActive ? 'is-active' : ''}" data-lesson-id="${t.topicId}">
                <div class="es-video__thumb">${isActive ? '▶' : icon}</div>
                <div><strong>${t.topicName}</strong><br><small>${isActive ? 'Current lesson' : 'Ready'}</small></div>
              </article>
            `;
          }).join('');

          // Bind playlist item clicks
          sidebar.querySelectorAll('[data-lesson-id]').forEach((item) => {
            item.addEventListener('click', () => {
              const targetId = item.dataset.lessonId;
              if (targetId !== currentTopicId) {
                switchTopic(targetId, activePillar);
              }
            });
          });
        }

        // Initialize first topic
        if (initialTopicId) {
          switchTopic(initialTopicId, activePillar);
        }
      }

      // Fetch dynamic content map
      window.EduStarAPI.requestJson('/api/content-map').then((map) => {
        initializeWithMap(map);
